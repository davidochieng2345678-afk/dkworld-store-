<!-- Styles -->
<style>
  body, html { margin:0; padding:0; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background:#f5f5f5; overflow-x:hidden; }
  nav { background:#111827; display:flex; justify-content:center; flex-wrap:wrap; padding:15px; gap:20px; }
  nav a { color:white; text-decoration:none; font-weight:bold; transition:0.3s; }
  nav a.active, nav a:hover { color:#25D366; }

  header { text-align:center; padding:20px; }
  header h1 { margin:0; font-size:2em; color:#111827; }
  header p { color:#555; }

  .hero { background:#25D366; color:white; text-align:center; padding:60px 20px; }
  .hero h2 { font-size:2.5em; margin-bottom:15px; }
  .hero p { font-size:1.2em; margin-bottom:20px; }
  .hero a { display:inline-block; background:white; color:#25D366; padding:12px 25px; border-radius:10px; font-weight:bold; text-decoration:none; transition:0.3s; }
  .hero a:hover { background:#e6e6e6; }
  .trust-badges { display:flex; flex-wrap:wrap; justify-content:center; gap:15px; margin-top:15px; font-weight:bold; font-size:0.9em; }

  .search-bar { width:100%; max-width:1200px; margin:20px auto; display:block; padding:12px; border-radius:8px; border:1px solid #ccc; }

  .filters { display:flex; flex-wrap:wrap; justify-content:center; gap:10px; margin:20px 0; }
  .filters button { padding:10px 20px; border:none; border-radius:8px; cursor:pointer; background:#111827; color:white; font-weight:bold; transition:0.3s; }
  .filters button.active, .filters button:hover { background:#25D366; }

  .products { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:20px; padding:20px; }
  .product-card { background:white; border-radius:15px; overflow:hidden; box-shadow:0 6px 15px rgba(0,0,0,0.1); display:flex; flex-direction:column; transition:transform 0.3s, box-shadow 0.3s; }
  .product-card:hover { transform: translateY(-5px); box-shadow:0 10px 20px rgba(0,0,0,0.15); }
  .product-card img, .product-card iframe { width:100%; height:180px; object-fit:cover; }
  .product-card .content { padding:15px; flex-grow:1; display:flex; flex-direction:column; }
  .product-card h3 { margin:5px 0; font-size:1.2em; color:#111827; }
  .product-card p { font-size:0.9em; color:#555; flex-grow:1; }
  .product-card .price { font-weight:bold; margin:10px 0; color:#111827; }
  .product-card a { text-align:center; background:#25D366; color:white; padding:10px; border-radius:8px; text-decoration:none; font-weight:bold; margin-top:5px; transition:0.3s; }
  .product-card a:hover { background:#1DA851; }

  @media(max-width:600px){ .filters { flex-direction: column; } }
</style>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "XXXX",
  appId: "XXXX"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const container = document.getElementById("productsContainer");
const featuredSlider = document.getElementById("featuredSlider");

let products = [];

async function loadProducts() {
  const snapshot = await getDocs(collection(db, "products"));
  products = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

  displayFeatured(products.slice(0,5));
  displayProducts(products);
}

function createCard(prod){
  const card = document.createElement("div");
  card.className = "product-card";
  const media = prod.video 
    ? `<iframe src="${prod.video}" frameborder="0" allowfullscreen></iframe>` 
    : `<img src="${prod.image}" alt="${prod.name}" loading="lazy">`;
  card.innerHTML = `${media}<div class="content">
    <div style="background:#25D366;color:white;padding:5px 10px;border-radius:5px;font-size:0.8em;display:inline-block;margin-bottom:5px;">
      ⚡ Ready to Sell in 24h
    </div>
    <h3>${prod.name}</h3>
    <p>${prod.description}</p>
    <p>Category: ${prod.category}</p>
    <div class="price">Ksh ${prod.price} | Stock: ${prod.stock}</div>
    <a href="product.html?sku=${encodeURIComponent(prod.sku)}">View Details</a>
    <a href="https://wa.me/254710346789?text=I%20want%20to%20buy%20${encodeURIComponent(prod.name)}%20SKU:${encodeURIComponent(prod.sku)}" target="_blank">Buy on WhatsApp</a>
  </div>`;
  return card;
}

function displayProducts(filteredProducts){
  container.innerHTML = "";
  if(filteredProducts.length===0){
    container.innerHTML="<p style='text-align:center;'>No products found.</p>";
    return;
  }
  filteredProducts.forEach(p => container.appendChild(createCard(p)));
}

function displayFeatured(productsList){
  featuredSlider.innerHTML="";
  productsList.forEach(p => featuredSlider.appendChild(createCard(p)));
}

function filterProducts(category){
  document.querySelectorAll(".filters button").forEach(btn=>btn.classList.remove("active"));
  event.target.classList.add("active");
  displayProducts(category==='all'?products:products.filter(p=>p.category.toLowerCase()===category.toLowerCase()));
}

document.addEventListener("DOMContentLoaded", loadProducts);
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="google-site-verification" content="jaR9slJ6xqPv5YMNdIkxbD9R2tcEGJbkZMON0Wegpe0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DK World Kenya - Digital Products & E-commerce</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial;}
body{background:#f5f5f5;max-width:1400px;margin:auto;}

nav{
  background:#111827;color:white;padding:15px;
  display:flex;justify-content:center;gap:20px;
}
nav a{color:white;text-decoration:none;font-weight:bold;}
nav a:hover{color:#25D366;}

header{text-align:center;padding:20px;}

.hero{
  background:#25D366;color:white;
  text-align:center;padding:40px;
}

.search-bar{
  width:90%;margin:20px auto;
  display:block;padding:12px;
}

.filters{
  display:flex;justify-content:center;
  gap:10px;margin:10px;
}
.filters button{
  padding:10px;background:#111827;
  color:white;border:none;cursor:pointer;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;padding:20px;
}

.product-card{
  background:white;border-radius:10px;
  overflow:hidden;
  box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

.product-card img{
  width:100%;height:180px;object-fit:cover;
}

.content{padding:12px;}

.price{font-weight:bold;margin:10px 0;}

.slider{
  display:flex;overflow-x:auto;
  gap:15px;padding:20px;
}

.review-card{
  background:white;padding:15px;
  border-radius:10px;min-width:250px;
}

footer{
  text-align:center;padding:20px;
  background:#111827;color:white;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
<a href="admin.html">Admin</a>
</nav>

<!-- HEADER -->
<header>
<h1>DK World Kenya</h1>
<p>Digital Products, E-commerce & Local Websites</p>
</header>

<!-- HERO -->
<div class="hero">
<h2>Build Your Digital Presence Today</h2>
<p>Websites, Stores & Digital Products Made Simple</p>
</div>

<!-- SEARCH -->
<input type="text" id="searchInput" placeholder="Search products..." class="search-bar">

<!-- FILTERS -->
<div class="filters">
<button onclick="filterProducts('all')">All</button>
<button onclick="filterProducts('digital')">Digital</button>
<button onclick="filterProducts('ecommerce')">E-commerce</button>
<button onclick="filterProducts('local')">Local Sites</button>
</div>

<!-- PRODUCTS -->
<section id="productsContainer" class="products"></section>

<!-- FEATURED -->
<h2 style="text-align:center;">Featured Products</h2>
<div id="featuredSlider" class="slider"></div>

<!-- REVIEWS -->
<h2 style="text-align:center;">What Our Clients Say</h2>
<div id="reviewsContainer" class="slider"></div>

<footer>© 2026 DK World Kenya</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyABC...",
  authDomain: "dkworld-kenya.firebaseapp.com",
  projectId: "dkworld-kenya"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// DOM
const container = document.getElementById("productsContainer");
const featuredSlider = document.getElementById("featuredSlider");
const reviewsContainer = document.getElementById("reviewsContainer");
const searchInput = document.getElementById("searchInput");

let products = [];

// ===== CREATE PRODUCT CARD =====
function createCard(prod){
  const card = document.createElement("div");
  card.className = "product-card";

  const desc = prod.description || "";
  const shortDesc = desc.length > 180 ? desc.slice(0,180)+"..." : desc;

  card.innerHTML = `
    <img src="${prod.image || ''}" alt="${prod.name || ''}">
    <div class="content">

      <div style="background:#25D366;color:white;padding:4px 8px;border-radius:5px;font-size:12px;margin-bottom:5px;">
        ⚡ Ready in 24h
      </div>

      <h3>${prod.name || "No name"}</h3>

      <p>
        ${shortDesc}
        ${desc.length > 180 
          ? `<a href="product.html?sku=${encodeURIComponent(prod.sku)}" style="color:#25D366;"> Read More</a>` 
          : ""}
      </p>

      <p><strong>Category:</strong> ${prod.category || "N/A"}</p>

      <div class="price">
        Ksh ${prod.price || 0} | Stock: ${prod.stock || 0}
      </div>

      <a href="product.html?sku=${encodeURIComponent(prod.sku)}">View Details</a><br>

      <a href="https://wa.me/254710346789?text=I want to buy ${encodeURIComponent(prod.name)} (SKU:${encodeURIComponent(prod.sku)})" target="_blank">
        Buy on WhatsApp
      </a>

    </div>
  `;

  return card;
}

// ===== DISPLAY =====
function displayProducts(list){
  container.innerHTML = "";

  if(!list.length){
    container.innerHTML = "<p style='text-align:center;'>No products found</p>";
    return;
  }

  list.forEach(p => container.appendChild(createCard(p)));
}

// ===== FETCH FROM FIREBASE =====
async function fetchProducts(){
  try{
    const snapshot = await getDocs(collection(db,"products"));

    products = snapshot.docs.map(doc => ({
      id: doc.id,
      ...doc.data()
    }));

    displayProducts(products);

    // FEATURED ONLY
    const featured = products.filter(p => p.featured === true);

    featuredSlider.innerHTML = "";
    featured.forEach(p => featuredSlider.appendChild(createCard(p)));

  } catch(err){
    container.innerHTML = "<p style='color:red;'>Error loading products</p>";
    console.error(err);
  }
}

// ===== FILTER =====
window.filterProducts = function(cat){
  if(cat === "all"){
    displayProducts(products);
  } else {
    displayProducts(products.filter(p => p.category === cat));
  }
}

// ===== SEARCH =====
searchInput.addEventListener("input", ()=>{
  const v = searchInput.value.toLowerCase();

  const filtered = products.filter(p =>
    p.name?.toLowerCase().includes(v) ||
    p.category?.toLowerCase().includes(v)
  );

  displayProducts(filtered);
});

// ===== REVIEWS =====
[
  "Amazing service, my store was ready fast!",
  "Professional and reliable.",
  "Highly recommend DK World Kenya!"
].forEach(text=>{
  const div = document.createElement("div");
  div.className = "review-card";
  div.textContent = text;
  reviewsContainer.appendChild(div);
});

// INIT
fetchProducts();
</script>

</body>
</html>

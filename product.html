// ---------- FORMAT DESCRIPTION: Plain text → semantic HTML with headings, lists, bold long-tail keywords ----------
function formatDescription(plainText, productName, category) {
  if (!plainText) return "<p>No description available.</p>";
  // If already contains HTML tags, return as-is (but ensure safe)
  if (/<\/?[a-z][\s\S]*>/i.test(plainText)) {
    return `<div class="product-description">${plainText}</div>`;
  }
  
  // 1. split lines
  let lines = plainText.split(/\r?\n/);
  let result = [];
  let inList = false;
  let listItems = [];
  
  // Helper to bold long-tail keywords & important terms
  const boldLongTail = (text) => {
    // list of long-tail / conversion keywords (e-commerce + Kenya specific)
    const keywords = [
      productName, category, "Kenya", "Nairobi", "best price", "high quality", 
      "free delivery", "original", "money back", "warranty", "digital product", 
      "instant download", "affordable", "top rated", "trusted seller", "fast shipping",
      "customer support", "24/7", "secure payment", "best in Kenya"
    ];
    let bolded = text;
    keywords.forEach(kw => {
      if (!kw) return;
      const regex = new RegExp(`(${kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
      bolded = bolded.replace(regex, `<strong class="highlight-bold">$1</strong>`);
    });
    // also bold phrases that look like long-tail (3-6 words starting with capital letter, product features)
    const longTailRegex = /\b([A-Z][a-z]+(?:\s+[A-Za-z][a-z]*){2,5})\b/g;
    bolded = bolded.replace(longTailRegex, (match) => {
      if (match.length > 10 && !match.includes('strong')) 
        return `<strong class="highlight-bold">${match}</strong>`;
      return match;
    });
    return bolded;
  };
  
  for (let i = 0; i < lines.length; i++) {
    let line = lines[i].trim();
    if (line === "") {
      if (inList) {
        result.push(`<ul>${listItems.join('')}</ul>`);
        listItems = [];
        inList = false;
      }
      continue;
    }
    
    // Detect bullet list items
    if (line.match(/^[\-\*•]\s/)) {
      let content = line.replace(/^[\-\*•]\s/, '');
      content = boldLongTail(content);
      listItems.push(`<li>${content}</li>`);
      inList = true;
      continue;
    }
    
    if (inList) {
      result.push(`<ul>${listItems.join('')}</ul>`);
      listItems = [];
      inList = false;
    }
    
    // Detect headings (ends with colon OR short line & capital pattern OR contains specific keywords)
    const isHeading = (line.length < 70 && (line.endsWith(':') || /^(Features|Specs|Benefits|Details|Why Choose|Highlights|Description|Overview|Key Features|What's Included)/i.test(line)));
    if (isHeading) {
      let headingText = line.replace(/:$/, '');
      headingText = boldLongTail(headingText);
      result.push(`<h3>${headingText}</h3>`);
      continue;
    }
    
    // Normal paragraph
    let para = boldLongTail(line);
    result.push(`<p>${para}</p>`);
  }
  
  if (inList && listItems.length) {
    result.push(`<ul>${listItems.join('')}</ul>`);
  }
  
  return `<div class="product-description">${result.join('')}</div>`;
}

// Helper to update meta & canonical
function updateMetaAndSchema(product, formattedDescriptionPlain) {
  // meta description (strip HTML)
  const plainDesc = product.description.replace(/<[^>]*>/g, '').substring(0, 160);
  document.title = `${product.name} - DK World Kenya | Best Digital Products`;
  const metaDesc = document.querySelector('meta[name="description"]');
  if (metaDesc) metaDesc.setAttribute("content", plainDesc || `Buy ${product.name} in Kenya at Ksh ${product.price}. Quality guaranteed.`);
  const metaKeywords = document.querySelector('meta[name="keywords"]');
  if (metaKeywords) metaKeywords.setAttribute("content", `${product.category}, ${product.name}, buy ${product.name} Kenya, digital products, DK World Kenya`);
  
  // Open Graph
  document.querySelector('meta[property="og:title"]').setAttribute("content", `${product.name} - DK World Kenya`);
  document.querySelector('meta[property="og:description"]').setAttribute("content", plainDesc.substring(0, 200));
  if (product.image) document.querySelector('meta[property="og:image"]').setAttribute("content", product.image);
  document.querySelector('meta[property="og:url"]').setAttribute("content", `https://dkworldkenya.online/product.html?sku=${encodeURIComponent(product.sku)}`);
  
  // Canonical link
  const canonicalLink = document.getElementById("dynamicCanonical");
  if (canonicalLink) canonicalLink.href = `https://dkworldkenya.online/product.html?sku=${encodeURIComponent(product.sku)}`;
  
  // Product Schema (rich snippet)
  const productSchema = {
    "@context": "https://schema.org",
    "@type": "Product",
    "name": product.name,
    "image": product.image || "https://dkworldkenya.online/default.jpg",
    "description": plainDesc,
    "sku": product.sku,
    "brand": {
      "@type": "Brand",
      "name": "DK World Kenya"
    },
    "offers": {
      "@type": "Offer",
      "url": `https://dkworldkenya.online/product.html?sku=${encodeURIComponent(product.sku)}`,
      "priceCurrency": "KES",
      "price": product.price,
      "priceValidUntil": "2026-12-31",
      "availability": product.stock > 0 ? "https://schema.org/InStock" : "https://schema.org/OutOfStock",
      "seller": {
        "@type": "Organization",
        "name": "DK World Kenya"
      }
    }
  };
  document.getElementById("productSchema").textContent = JSON.stringify(productSchema);
}

// Breadcrumb + BreadcrumbList Schema
function setBreadcrumb(category, productName, skuVal) {
  const baseUrl = "https://dkworldkenya.online";
  const breadcrumbHtml = `
    <a href="index.html">Home</a> &nbsp;›&nbsp;
    <a href="index.html?category=${encodeURIComponent(category)}">${category}</a> &nbsp;›&nbsp;
    <span>${productName}</span>
  `;
  breadcrumbDiv.innerHTML = breadcrumbHtml;
  
  const breadcrumbList = {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      { "@type": "ListItem", "position": 1, "name": "Home", "item": `${baseUrl}/index.html` },
      { "@type": "ListItem", "position": 2, "name": category, "item": `${baseUrl}/index.html?category=${encodeURIComponent(category)}` },
      { "@type": "ListItem", "position": 3, "name": productName, "item": `${baseUrl}/product.html?sku=${encodeURIComponent(skuVal)}` }
    ]
  };
  document.getElementById("breadcrumbSchema").textContent = JSON.stringify(breadcrumbList);
}

// WhatsApp with quantity
let currentQuantity = 1;
function updateWhatsAppLink(product) {
  const qty = currentQuantity;
  const message = `I want to buy ${qty} x ${product.name} (SKU: ${product.sku}) - Total Ksh ${product.price * qty}. Please confirm availability.`;
  const waLink = `https://wa.me/254710346789?text=${encodeURIComponent(message)}`;
  const waBtn = document.getElementById("dynamicWhatsAppBtn");
  if (waBtn) waBtn.href = waLink;
}

// Build product UI with formatted description & quantity
function renderProductUI(product) {
  const formattedDescHTML = formatDescription(product.description, product.name, product.category);
  const mediaHtml = product.video 
    ? `<iframe class="product-media" src="${product.video}" frameborder="0" allowfullscreen style="width:100%; height:350px; border-radius:20px;"></iframe>`
    : `<img class="product-media" src="${product.image}" alt="${product.name}" loading="lazy" style="width:100%;">`;
  
  let stockHtml = '';
  if (product.stock > 10) stockHtml = `<span class="in-stock">✓ In Stock (${product.stock} units)</span>`;
  else if (product.stock > 0 && product.stock <= 10) stockHtml = `<span class="low-stock">⚠️ Low Stock - Only ${product.stock} left!</span>`;
  else stockHtml = `<span class="out-stock">✗ Out of Stock</span>`;
  
  const containerHtml = `
    <div class="product-grid">
      <div class="product-media">${mediaHtml}</div>
      <div class="product-details">
        <span class="category-badge">${product.category}</span>
        <h1>${product.name}</h1>
        <div class="price-box">
          <span class="current-price">Ksh ${Number(product.price).toLocaleString()}</span>
        </div>
        <div class="stock-status">${stockHtml}</div>
        <div class="quantity-selector">
          <button class="quantity-btn" id="minusQty">−</button>
          <input type="number" id="quantityInput" value="1" min="1" max="${product.stock > 0 ? product.stock : 1}" step="1">
          <button class="quantity-btn" id="plusQty">+</button>
        </div>
        <a id="dynamicWhatsAppBtn" class="whatsapp-btn" target="_blank" href="#">
          💬 Buy on WhatsApp
        </a>
        <div class="trust-badge">
          <span class="trust-item">🔒 Secure Checkout</span>
          <span class="trust-item">🚚 Fast Delivery Kenya</span>
          <span class="trust-item">✅ 100% Genuine</span>
          <span class="trust-item">🛡️ Buyer Protection</span>
        </div>
      </div>
    </div>
    ${formattedDescHTML}
  `;
  container.innerHTML = containerHtml;
  
  // quantity controls
  const minusBtn = document.getElementById("minusQty");
  const plusBtn = document.getElementById("plusQty");
  const qtyInput = document.getElementById("quantityInput");
  
  const updateQuantity = () => {
    let val = parseInt(qtyInput.value);
    if (isNaN(val)) val = 1;
    if (val < 1) val = 1;
    if (product.stock > 0 && val > product.stock) val = product.stock;
    currentQuantity = val;
    qtyInput.value = val;
    updateWhatsAppLink(product);
  };
  
  minusBtn?.addEventListener("click", () => {
    let val = parseInt(qtyInput.value) - 1;
    if (val < 1) val = 1;
    qtyInput.value = val;
    updateQuantity();
  });
  plusBtn?.addEventListener("click", () => {
    let val = parseInt(qtyInput.value) + 1;
    if (product.stock > 0 && val > product.stock) val = product.stock;
    qtyInput.value = val;
    updateQuantity();
  });
  qtyInput?.addEventListener("change", updateQuantity);
  updateWhatsAppLink(product);
}

// Related products loader (improved)
async function loadRelatedProducts(category, currentSku) {
  if (!category) return;
  const q = query(collection(db, "products"), where("category", "==", category));
  const snapshot = await getDocs(q);
  const related = [];
  snapshot.forEach(docSnap => {
    const prod = docSnap.data();
    if (prod.sku !== currentSku) related.push(prod);
  });
  relatedContainer.innerHTML = "";
  if (related.length === 0) {
    relatedContainer.innerHTML = "<p style='text-align:center;'>✨ More products coming soon.</p>";
    return;
  }
  related.slice(0, 8).forEach(prod => {
    const card = document.createElement("div");
    card.className = "product-card";
    card.innerHTML = `
      <img src="${prod.image}" alt="${prod.name}" loading="lazy">
      <div class="content">
        <h3>${prod.name}</h3>
        <div class="price">Ksh ${Number(prod.price).toLocaleString()}</div>
        <div class="card-buttons">
          <a href="product.html?sku=${encodeURIComponent(prod.sku)}" class="view-link">View</a>
          <a target="_blank" href="https://wa.me/254710346789?text=I%20want%20to%20buy%20${encodeURIComponent(prod.name)}" class="wa-link">WhatsApp</a>
        </div>
      </div>
    `;
    relatedContainer.appendChild(card);
  });
}

// Main load product
async function loadProduct() {
  if (!sku) {
    container.innerHTML = "<div style='padding:2rem; text-align:center'>❌ No product selected. <a href='index.html'>Browse products</a></div>";
    return;
  }
  try {
    const q = query(collection(db, "products"), where("sku", "==", sku));
    const snapshot = await getDocs(q);
    if (snapshot.empty) {
      container.innerHTML = "<div style='padding:2rem; text-align:center'>⚠️ Product not found. <a href='index.html'>Return to shop</a></div>";
      return;
    }
    snapshot.forEach(docSnap => {
      const product = docSnap.data();
      // Update page metadata + schemas
      updateMetaAndSchema(product, product.description);
      setBreadcrumb(product.category, product.name, product.sku);
      renderProductUI(product);
      loadRelatedProducts(product.category, product.sku);
    });
  } catch (error) {
    console.error("Firebase error:", error);
    container.innerHTML = "<div style='padding:2rem; text-align:center'>⚠️ Unable to load product. Refresh or try again.</div>";
  }
}

// Active nav highlight
document.querySelectorAll("nav a").forEach(link => {
  if (link.href === window.location.href.split('?')[0]) link.classList.add("active");
});

loadProduct();
</script>
<script>
// FIXED: Add clickable "View" buttons for products (using event delegation)
(function() {
  // Function to add View column and buttons
  function addViewButtons() {
    const table = document.querySelector('#productTable');
    if (!table) return;
    
    // Add "View" column header if missing
    const theadRow = table.querySelector('thead tr');
    let hasView = false;
    for (let th of theadRow.cells) {
      if (th.innerText.trim().toLowerCase() === 'view') hasView = true;
    }
    if (!hasView) {
      const th = document.createElement('th');
      th.innerText = 'View';
      theadRow.appendChild(th);
    }
    
    // Add view button cell to each row if not already present
    const rows = table.querySelectorAll('tbody tr');
    rows.forEach(row => {
      if (row.querySelector('.view-btn-cell')) return; // already has view cell
      
      // Find the edit button to extract product ID
      const editBtn = row.querySelector('.edit');
      if (!editBtn) return;
      const onclickAttr = editBtn.getAttribute('onclick');
      const match = onclickAttr && onclickAttr.match(/editProduct\('([^']+)'\)/);
      const productId = match ? match[1] : null;
      if (!productId) return;
      
      const td = document.createElement('td');
      td.className = 'view-btn-cell';
      const btn = document.createElement('button');
      btn.textContent = 'View →';
      btn.style.background = '#2563eb';
      btn.style.color = 'white';
      btn.style.border = 'none';
      btn.style.borderRadius = '5px';
      btn.style.padding = '5px 10px';
      btn.style.cursor = 'pointer';
      // Use a data attribute and event delegation (safer than onclick)
      btn.setAttribute('data-product-id', productId);
      btn.classList.add('product-view-button');
      td.appendChild(btn);
      row.appendChild(td);
    });
  }
  
  // Event delegation: listen for clicks on the whole table
  document.addEventListener('click', function(e) {
    const btn = e.target.closest('.product-view-button');
    if (btn && btn.classList.contains('product-view-button')) {
      e.preventDefault();
      const productId = btn.getAttribute('data-product-id');
      if (productId) {
        window.open(`/product.html?id=${productId}`, '_blank');
      }
    }
  });
  
  // Initial run
  addViewButtons();
  
  // Observe table changes (when products are added/edited/deleted)
  const observer = new MutationObserver(function() {
    addViewButtons();
  });
  const productTbody = document.querySelector('#productTable tbody');
  if (productTbody) observer.observe(productTbody, { childList: true, subtree: true });
})();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="Loading product details...">
<meta name="keywords" content="Kenya e-commerce, digital products Kenya, local websites, HTML sites, DK World Kenya">

<!-- Structured Data -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Product"

<style>
body { font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin:0; padding:0; background:#f5f5f5; }
nav { background:#111827; color:white; padding:15px; display:flex; justify-content:center; flex-wrap:wrap; gap:20px; }
nav a { color:white; text-decoration:none; font-weight:bold; }
nav a:hover, nav a.active { color:#25D366; }

.container { max-width:900px; margin:30px auto; padding:20px; background:white; border-radius:12px; box-shadow:0 6px 18px rgba(0,0,0,0.1); }
.product-media { width:100%; max-height:400px; object-fit:cover; border-radius:12px; margin-bottom:20px; }
h1 { color:#111827; margin-bottom:10px; }
h2 { font-size:1.5rem; margin-top:30px; margin-bottom:15px; color:#111827; }
h3 { font-size:1.3rem; margin-top:20px; margin-bottom:10px; color:#111827; }
.category { color:#555; margin-bottom:10px; font-weight:bold; }
.price { font-weight:bold; font-size:1.3em; color:#111827; margin-bottom:15px; }
.stock { margin-bottom:15px; color:#777; }
p { line-height:1.6; color:#555; margin-bottom:15px; }
ul, ol { margin-left:20px; margin-bottom:15px; }
li { margin-bottom:8px; }
a.whatsapp { display:inline-block; padding:12px 25px; background:#25D366; color:white; border-radius:10px; text-decoration:none; font-weight:bold; transition:0.3s; }
a.whatsapp:hover { background:#1DA851; }

.slider{display:flex;gap:15px;padding:20px;overflow-x:auto;}
.product-card{background:white;border-radius:12px;overflow:hidden;box-shadow:0 6px 15px rgba(0,0,0,0.08);transition:0.3s;min-width:260px;}
.product-card:hover{transform:translateY(-5px);}
.product-card img{width:100%;height:180px;object-fit:cover;}
.content{padding:12px;}
.content h3{font-size:1.1rem;margin-bottom:8px;}
.content a{display:block;margin:5px 0;padding:8px;text-align:center;border-radius:6px;text-decoration:none;font-weight:600;}
.content a:first-of-type{background:#111827;color:white;}
.content a:last-of-type{background:#25D366;color:white;}

footer { text-align:center; padding:25px; color:#777; font-size:0.9em; margin-top:40px; }
</style>
</head>
<body>

<!-- Navigation -->
<nav>
  <a href="index.html">Home</a>
  <a href="about.html">About Us</a>
  <a href="contact.html">Contact</a>
  <a href="admin.html">Admin</a>
</nav>

<!-- Product Container -->
<div class="container" id="productContainer">
  <p>Loading product details...</p>
</div>

<!-- Related Products -->
<h2 style="text-align:center;margin-top:40px;">Related Products</h2>
<div id="relatedProducts" class="slider"></div>

<!-- Footer -->
<footer>
  &copy; 2026 DK World Kenya | Built by <a href="https://dkdigitalseo.online" target="_blank" style="color:#25D366;text-decoration:none;">David O. Kiruo</a>, SEO owner of DK Digital SEO
</footer>

<!-- ================== Firebase & Product Script ================== -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyABCVM1b9FEdXlJWf1SoL7dwQL1EXPXwgA",
  authDomain: "dkworld-kenya.firebaseapp.com",
  projectId: "dkworld-kenya",
  storageBucket: "dkworld-kenya.firebasestorage.app",
  messagingSenderId: "263537160242",
  appId: "1:263537160242:web:a07511fae26faabf584c2b"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Container reference
const container = document.getElementById("productContainer");
const relatedContainer = document.getElementById("relatedProducts");

// Get SKU from URL
const params = new URLSearchParams(window.location.search);
const sku = params.get("sku");

async function loadProduct() {
  if (!sku) {
    container.innerHTML = "<p>No product selected. <a href='index.html'>Go back</a></p>";
    return;
  }

  const q = query(collection(db, "products"), where("sku", "==", sku));
  const snapshot = await getDocs(q);

  if (snapshot.empty) {
    container.innerHTML = "<p>Product not found. <a href='index.html'>Go back</a></p>";
    return;
  }

  snapshot.forEach(docSnap => {
    const product = docSnap.data();

    let media = product.video 
      ? `<iframe class="product-media" src="${product.video}" frameborder="0" allowfullscreen></iframe>` 
      : `<img class="product-media" src="${product.image}" alt="${product.name}">`;

    container.innerHTML = `
      ${media}
      <h1>${product.name}</h1>
      <p class="category">Category: ${product.category}</p>
      <p class="price">Price: Ksh ${product.price}</p>
      <p class="stock">Stock: ${product.stock}</p>
      <div>${product.description}</div>
      <a class="whatsapp" target="_blank" href="https://wa.me/254710346789?text=I%20want%20to%20buy%20${encodeURIComponent(product.name)}%20SKU:${encodeURIComponent(product.sku)}">Buy on WhatsApp</a>
    `;

    // Update page title & meta
    document.title = `${product.name} - DK World Kenya`;
    document.querySelector('meta[name="description"]').setAttribute("content", product.description);

    // Update structured data
    const sd = document.querySelector('script[type="application/ld+json"]');
    sd.textContent = JSON.stringify({
      "@context":"https://schema.org",
      "@type":"Product",
      "name": product.name,
      "image": product.image,
      "description": product.description,
      "sku": product.sku,
      "offers": {
        "@type":"Offer",
        "url": `https://dkworldkenya.online/product.html?sku=${encodeURIComponent(product.sku)}`,
        "priceCurrency":"KES",
        "price": product.price,
        "availability": product.stock > 0 ? "https://schema.org/InStock" : "https://schema.org/OutOfStock"
      }
    });

    // Load related products
    loadRelatedProducts(product.category, product.sku);
  });
}

// Related products
async function loadRelatedProducts(category, currentSku) {
  if (!category) return;
  const q = query(collection(db, "products"), where("category", "==", category));
  const snapshot = await getDocs(q);

  const related = [];
  snapshot.forEach(docSnap => {
    const prod = docSnap.data();
    if (prod.sku !== currentSku) related.push(prod);
  });

  relatedContainer.innerHTML = "";
  if (!related.length) {
    relatedContainer.innerHTML = "<p>No related products found.</p>";
    return;
  }

  related.forEach(prod => {
    const card = document.createElement("div");
    card.className = "product-card";

    card.innerHTML = `
      <img src="${prod.image}" alt="${prod.name}">
      <div class="content">
        <h3>${prod.name}</h3>
        <p class="price">Ksh ${prod.price}</p>
        <a href="product.html?sku=${encodeURIComponent(prod.sku)}">View Product</a>
        <a target="_blank" href="https://wa.me/254710346789?text=I%20want%20to%20buy%20${encodeURIComponent(prod.name)}">Buy on WhatsApp</a>
      </div>
    `;
    relatedContainer.appendChild(card);
  });
}

// Highlight active nav
document.querySelectorAll("nav a").forEach(link => {
  if(link.href === window.location.href) link.classList.add("active");
});

loadProduct();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DK World Kenya - Admin Panel</title>
<meta name="description" content="Admin panel to manage DK World Kenya products. Add, edit, delete products including images and videos.">
<meta name="keywords" content="DK World Kenya admin, product management, e-commerce Kenya, digital products">
<meta name="author" content="David Ochieng">
<link rel="canonical" href="https://dkworldkenya.online/admin.html">
<meta name="robots" content="noindex, nofollow">

<style>
  body { font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin:0; padding:0; background:#f5f5f5; }
  nav { background:#111827; color:white; padding:15px; display:flex; justify-content:center; flex-wrap:wrap; gap:20px; }
  nav a { color:white; text-decoration:none; font-weight:bold; }
  nav a:hover, nav a.active { color:#25D366; }

  .container { max-width:900px; margin:auto; padding:20px; background:white; border-radius:12px; box-shadow:0 6px 18px rgba(0,0,0,0.1); }
  h1 { text-align:center; margin-bottom:20px; color:#111827; }
  form { display:flex; flex-direction:column; gap:12px; margin-bottom:30px; }
  input, select, textarea { padding:10px; border-radius:8px; border:1px solid #ccc; width:100%; font-size:1em; }
  button { padding:12px; border:none; border-radius:8px; background:#25D366; color:white; font-weight:bold; cursor:pointer; transition:0.3s; }
  button:hover { background:#1DA851; }

  table { width:100%; border-collapse:collapse; margin-top:20px; }
  th, td { padding:10px; text-align:left; border-bottom:1px solid #ddd; }
  th { background:#111827; color:white; }
  td button { padding:5px 10px; margin-right:5px; font-size:0.9em; }
  td button.edit { background:#1DA851; color:white; border:none; border-radius:5px; cursor:pointer; }
  td button.delete { background:#FF4B4B; color:white; border:none; border-radius:5px; cursor:pointer; }

  footer { text-align:center; padding:25px; color:#777; font-size:0.9em; margin-top:40px; }
</style>
</head>
<body>

<nav>
  <a href="index.html">Home</a>
  <a href="about.html">About Us</a>
  <a href="contact.html">Contact</a>
  <a href="admin.html">Admin</a>
</nav>

<div class="container">
  <h1>Admin Panel - DK World Kenya</h1>

  <form id="productForm">
    <input type="hidden" id="editIndex">
    <input type="text" id="name" placeholder="Product Name" required>
    <textarea id="description" placeholder="Product Description" rows="3" required></textarea>
    <select id="category" required>
      <option value="">Select Category</option>
      <option value="e-commerce">E-commerce Websites</option>
      <option value="digital">Digital Products</option>
      <option value="local">Local HTML Sites</option>
    </select>
    <input type="number" id="price" placeholder="Price (KES)" required>
    <input type="number" id="stock" placeholder="Stock Quantity" required>
    <input type="text" id="sku" placeholder="SKU (Unique)" required>
    <input type="url" id="image" placeholder="Image URL" required>
    <input type="url" id="video" placeholder="Video URL (optional)">
    <button type="submit">Add / Update Product</button>
  </form>

  <table id="productTable">
    <thead>
      <tr>
        <th>Name</th>
        <th>Category</th>
        <th>Price</th>
        <th>Stock</th>
        <th>SKU</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <!-- Products will appear here -->
    </tbody>
  </table>
</div>

<footer>
  &copy; 2026 DK World Kenya | Built by David
</footer>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [];
const form = document.getElementById("productForm");
const tableBody = document.querySelector("#productTable tbody");

function displayTable(){
  tableBody.innerHTML = "";
  products.forEach((p, index) => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${p.name}</td>
      <td>${p.category}</td>
      <td>Ksh ${p.price}</td>
      <td>${p.stock}</td>
      <td>${p.sku}</td>
      <td>
        <button class="edit" onclick="editProduct(${index})">Edit</button>
        <button class="delete" onclick="deleteProduct(${index})">Delete</button>
      </td>
    `;
    tableBody.appendChild(tr);
  });
}

function editProduct(index){
  const p = products[index];
  document.getElementById("name").value = p.name;
  document.getElementById("description").value = p.description;
  document.getElementById("category").value = p.category;
  document.getElementById("price").value = p.price;
  document.getElementById("stock").value = p.stock;
  document.getElementById("sku").value = p.sku;
  document.getElementById("image").value = p.image;
  document.getElementById("video").value = p.video;
  document.getElementById("editIndex").value = index;
}

function deleteProduct(index){
  if(confirm("Are you sure you want to delete this product?")){
    products.splice(index,1);
    localStorage.setItem("products", JSON.stringify(products));
    displayTable();
    alert("Product deleted. Homepage will update automatically.");
  }
}

form.addEventListener("submit", function(e){
  e.preventDefault();
  const newProduct = {
    name: document.getElementById("name").value,
    description: document.getElementById("description").value,
    category: document.getElementById("category").value,
    price: parseFloat(document.getElementById("price").value),
    stock: parseInt(document.getElementById("stock").value),
    sku: document.getElementById("sku").value,
    image: document.getElementById("image").value,
    video: document.getElementById("video").value
  };

  const editIndex = document.getElementById("editIndex").value;
  if(editIndex === ""){
    products.push(newProduct);
    alert("Product added successfully. Homepage will update automatically.");
  } else {
    products[editIndex] = newProduct;
    alert("Product updated successfully. Homepage will update automatically.");
  }

  localStorage.setItem("products", JSON.stringify(products));
  form.reset();
  document.getElementById("editIndex").value = "";
  displayTable();
});

displayTable();
</script>


  <section style="margin-top:40px; padding:20px; background:#fff; border-radius:12px;">
  <h2>Manage Policies</h2>

  <select id="policySelect" style="padding:10px; margin-bottom:10px;">
    <option value="terms">Terms of Service</option>
    <option value="privacy">Privacy Policy</option>
    <option value="refund">Refund Policy</option>
    <option value="shipping">Shipping Policy</option>
  </select>

  <textarea id="policyText" rows="10" style="width:100%; padding:10px; border-radius:8px;"></textarea>

  <button onclick="savePolicy()" style="margin-top:10px; padding:10px; background:#25D366; color:white; border:none; border-radius:8px;">
    Save Policy
  </button>
</section>
</body>
</html>

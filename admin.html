<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DK World Kenya | Admin Panel</title>
  <meta name="description" content="Admin panel to add, edit, and manage products for DK World Kenya.">
  <link rel="stylesheet" href="css/style.css">
  <style>
    main { max-width: 900px; margin: 40px auto; padding: 0 20px; font-family: sans-serif; }
    input, textarea, select, button { width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 8px; border:1px solid #ccc; font-size:1rem; }
    textarea { min-height:80px; resize:vertical; }
    button { background:#1E3A8A; color:white; border:none; cursor:pointer; font-weight:bold; transition:0.3s; }
    button:hover { background:#111E6C; }
    .product-card { background:white; border-radius:12px; padding:15px; margin-bottom:15px; display:flex; justify-content:space-between; align-items:center; box-shadow:0 3px 10px rgba(0,0,0,0.05); }
    .product-card a { color:#1E3A8A; font-weight:500; text-decoration:none; }
    .delete-btn { background:#EF4444; color:white; border:none; padding:6px 12px; border-radius:6px; cursor:pointer; transition:0.3s; }
    .delete-btn:hover { background:#C22E2E; }
    .edit-btn { background:#3B82F6; color:white; border:none; padding:6px 12px; border-radius:6px; cursor:pointer; transition:0.3s; }
    .edit-btn:hover { background:#1E40AF; }
    h2 { color:#1E3A8A; margin-bottom:15px; }
    h3 { margin-top:25px; color:#111827; }
    .faq-section { display:flex; gap:10px; flex-wrap:wrap; }
    .faq-section input { flex:1; min-width:200px; }
  </style>
</head>
<body>

<header>
  <h1>DK World Kenya 🌍 - Admin Panel</h1>
  <nav>
    <div class="menu-toggle" id="menu-toggle">☰</div>
    <ul class="menu" id="menu">
      <li><a href="index.html">Home</a></li>
      <li><a href="cart.html">Cart 🛒</a></li>
    </ul>
  </nav>
</header>

<main>
  <h2>Add Product</h2>

  <input id="name" placeholder="Product Name" required>
  <input id="price" type="number" placeholder="Price (KES)" required>
  <input id="image" placeholder="Main Image URL" required>
  <input id="images" placeholder="Extra Images (comma separated URLs)">
  <input id="video" placeholder="YouTube Video Link (optional)">
  <input id="sku" placeholder="SKU (e.g ECOM-001)">
  <input id="stock" type="number" placeholder="Stock Quantity" required>

  <select id="category">
    <option value="Websites">Websites</option>
    <option value="Digital Products">Digital Products</option>
  </select>

  <textarea id="description" placeholder="Product Description" required></textarea>

  <h3>FAQs</h3>
  <div class="faq-section">
    <input id="faqQ1" placeholder="Question 1">
    <input id="faqA1" placeholder="Answer 1">
  </div>
  <div class="faq-section">
    <input id="faqQ2" placeholder="Question 2">
    <input id="faqA2" placeholder="Answer 2">
  </div>

  <button id="addUpdateBtn">Add Product</button>

  <h2>Existing Products</h2>
  <div id="existingProducts"></div>
</main>

<script>
let editIndex = null;

// ===== SAVE PRODUCTS =====
function saveProducts(products){
  localStorage.setItem("products", JSON.stringify(products));
}

// ===== RESET FORM =====
function resetForm(){
  document.getElementById("name").value = "";
  document.getElementById("price").value = "";
  document.getElementById("image").value = "";
  document.getElementById("images").value = "";
  document.getElementById("video").value = "";
  document.getElementById("sku").value = "";
  document.getElementById("stock").value = "";
  document.getElementById("category").selectedIndex = 0;
  document.getElementById("description").value = "";
  document.getElementById("faqQ1").value = "";
  document.getElementById("faqA1").value = "";
  document.getElementById("faqQ2").value = "";
  document.getElementById("faqA2").value = "";
  document.querySelector("h2").textContent = "Add Product";
  document.getElementById("addUpdateBtn").textContent = "Add Product";
  editIndex = null;
}

// ===== ADD OR UPDATE PRODUCT =====
function addOrUpdateProduct(){
  const name = document.getElementById("name").value.trim();
  const price = parseFloat(document.getElementById("price").value);
  const image = document.getElementById("image").value.trim();
  const imagesInput = document.getElementById("images").value.trim();
  const images = imagesInput ? imagesInput.split(",").map(i=>i.trim()) : [];
  if(image) images.unshift(image);
  const video = document.getElementById("video").value.trim();
  const sku = document.getElementById("sku").value.trim();
  const stock = parseInt(document.getElementById("stock").value) || 0;
  const category = document.getElementById("category").value;
  const description = document.getElementById("description").value.trim();

  const faq = [];
  const faqQ1 = document.getElementById("faqQ1").value.trim();
  const faqA1 = document.getElementById("faqA1").value.trim();
  if(faqQ1 && faqA1) faq.push({question: faqQ1, answer: faqA1});
  const faqQ2 = document.getElementById("faqQ2").value.trim();
  const faqA2 = document.getElementById("faqA2").value.trim();
  if(faqQ2 && faqA2) faq.push({question: faqQ2, answer: faqA2});

  if(!name || !price || images.length === 0 || !description){
    alert("Please fill in all required fields (name, price, main image, description).");
    return;
  }

  const product = { name, price, images, video, sku, stock, category, description, faq };
  const products = JSON.parse(localStorage.getItem("products")) || [];

  if(editIndex !== null){
    products[editIndex] = product;
    alert("✅ Product updated successfully!");
  } else {
    products.push(product);
    alert("✅ Product added successfully!");
  }

  saveProducts(products);
  displayExistingProducts();
  resetForm();
}

// ===== DISPLAY PRODUCTS =====
function displayExistingProducts(){
  const container = document.getElementById("existingProducts");
  const products = JSON.parse(localStorage.getItem("products")) || [];
  container.innerHTML = "";

  if(products.length === 0){
    container.innerHTML = "<p>No products added yet.</p>";
    return;
  }

  products.forEach((p,index)=>{
    const div = document.createElement("div");
    div.className = "product-card";

    const link = document.createElement("a");
    link.href = `product.html?name=${encodeURIComponent(p.name)}`;
    link.target = "_blank";
    link.textContent = `${p.name} (${p.category}) - KES ${p.price} - Stock: ${p.stock}`;

    const editBtn = document.createElement("button");
    editBtn.className = "edit-btn";
    editBtn.textContent = "Edit";
    editBtn.onclick = ()=>editProduct(index);

    const deleteBtn = document.createElement("button");
    deleteBtn.className = "delete-btn";
    deleteBtn.textContent = "Delete";
    deleteBtn.onclick = ()=>removeProduct(index);

    const btnDiv = document.createElement("div");
    btnDiv.style.display = "flex";
    btnDiv.style.gap = "5px";
    btnDiv.appendChild(editBtn);
    btnDiv.appendChild(deleteBtn);

    div.appendChild(link);
    div.appendChild(btnDiv);
    container.appendChild(div);
  });
}

// ===== EDIT PRODUCT =====
function editProduct(index){
  const products = JSON.parse(localStorage.getItem("products")) || [];
  const p = products[index];
  editIndex = index;

  document.getElementById("name").value = p.name;
  document.getElementById("price").value = p.price;
  document.getElementById("image").value = p.images[0] || "";
  document.getElementById("images").value = p.images.slice(1).join(", ");
  document.getElementById("video").value = p.video;
  document.getElementById("sku").value = p.sku;
  document.getElementById("stock").value = p.stock;
  document.getElementById("category").value = p.category;
  document.getElementById("description").value = p.description;
  document.getElementById("faqQ1").value = p.faq[0]?.question || "";
  document.getElementById("faqA1").value = p.faq[0]?.answer || "";
  document.getElementById("faqQ2").value = p.faq[1]?.question || "";
  document.getElementById("faqA2").value = p.faq[1]?.answer || "";

  document.querySelector("h2").textContent = "Edit Product";
  document.getElementById("addUpdateBtn").textContent = "Save Changes";
}

// ===== DELETE PRODUCT =====
function removeProduct(index){
  const products = JSON.parse(localStorage.getItem("products")) || [];
  if(!confirm(`Are you sure you want to delete "${products[index].name}"?`)) return;
  products.splice(index,1);
  saveProducts(products);
  displayExistingProducts();
}

// ===== INITIALIZE =====
document.addEventListener("DOMContentLoaded", displayExistingProducts);
document.getElementById("addUpdateBtn").addEventListener("click", addOrUpdateProduct);
</script>

</body>
</html>

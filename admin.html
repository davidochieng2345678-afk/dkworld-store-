<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - DK World Store</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
  <h1>DK World Store Admin</h1>
  <span id="menu-toggle" class="menu-toggle">&#9776;</span>
  <nav>
    <ul id="menu" class="menu">
      <li><a href="index.html">Home</a></li>
      <li><a href="cart.html">Cart (<span id="cartCount">0</span>)</a></li>
      <li><a href="admin.html">Admin</a></li>
    </ul>
  </nav>
</header>

<section style="padding:30px;">
  <h2>Add Product</h2>
  <form onsubmit="event.preventDefault(); addProductFromForm();">
    <input type="text" id="name" placeholder="Product Name" required><br><br>
    <input type="text" id="image" placeholder="Image URL" required><br><br>
    <input type="number" id="price" placeholder="Price" step="0.01" required><br><br>
    <input type="text" id="category" placeholder="Category"><br><br>
    <textarea id="description" placeholder="Description"></textarea><br><br>
    <button type="submit">Add Product</button>
  </form>
</section>

<script src="js/main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DK World Kenya - Admin Panel</title>
<meta name="description" content="Admin panel to manage DK World Kenya products. Add, edit, delete products with HTML content allowed.">
<meta name="author" content="David Ochieng">
<meta name="robots" content="noindex, nofollow">

<style>
  /* ===== Basic Styles ===== */
  body { font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin:0; padding:0; background:#f5f5f5; }
  nav { background:#111827; color:white; padding:15px; display:flex; justify-content:center; flex-wrap:wrap; gap:20px; }
  nav a { color:white; text-decoration:none; font-weight:bold; }
  nav a:hover, nav a.active { color:#25D366; }
  
  .container { max-width:900px; margin:auto; padding:20px; background:white; border-radius:12px; box-shadow:0 6px 18px rgba(0,0,0,0.1); }
  h1,h2 { text-align:center; margin-bottom:20px; color:#111827; }
  
  form { display:flex; flex-direction:column; gap:12px; margin-bottom:30px; }
  input, select, textarea { padding:10px; border-radius:8px; border:1px solid #ccc; width:100%; font-size:1em; }
  button { padding:12px; border:none; border-radius:8px; background:#25D366; color:white; font-weight:bold; cursor:pointer; transition:0.3s; }
  button:hover { background:#1DA851; }
  
  table { width:100%; border-collapse:collapse; margin-top:20px; }
  th, td { padding:10px; text-align:left; border-bottom:1px solid #ddd; word-break:break-word; }
  th { background:#111827; color:white; }
  td button { padding:5px 10px; margin-right:5px; font-size:0.9em; }
  td button.edit { background:#1DA851; color:white; border:none; border-radius:5px; cursor:pointer; }
  td button.delete { background:#FF4B4B; color:white; border:none; border-radius:5px; cursor:pointer; }
  
  @media (max-width:600px){
    th, td { font-size:0.85em; }
    input, select, textarea, button { font-size:0.9em; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html">Home</a>
  <a href="about.html">About Us</a>
  <a href="contact.html">Contact</a>
  <a href="admin.html" class="active">Admin</a>
</nav>

<div class="container">
  <h1>Admin Panel - DK World Kenya</h1>

  <!-- ===== PRODUCTS ===== -->
  <h2>Manage Products</h2>
  <form id="productForm">
    <input type="hidden" id="editProductIndex">
    <input type="text" id="name" placeholder="Product Name (HTML allowed)" required>
    <textarea id="description" placeholder="Product Description (HTML allowed)" rows="3" required></textarea>
    <select id="category" required>
      <option value="">Select Category</option>
      <option value="e-commerce">E-commerce Websites</option>
      <option value="digital">Digital Products</option>
      <option value="local">Local HTML Sites</option>
    </select>
    <input type="number" id="price" placeholder="Price (KES)" required>
    <input type="number" id="stock" placeholder="Stock Quantity" required>
    <input type="text" id="sku" placeholder="SKU (Unique)" required>
    <input type="url" id="image" placeholder="Image URL" required>
    <input type="url" id="video" placeholder="Video URL (optional)">
    <button type="submit">Add / Update Product</button>
  </form>

  <table id="productTable">
    <thead>
      <tr>
        <th>Name</th>
        <th>Category</th>
        <th>Price</th>
        <th>Stock</th>
        <th>SKU</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
/* ===== PRODUCTS ===== */
let products = JSON.parse(localStorage.getItem("products")) || [];
const productForm = document.getElementById("productForm");
const productTableBody = document.querySelector("#productTable tbody");

function displayProducts(){
  productTableBody.innerHTML = "";
  products.forEach((p,index)=>{
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${p.name}</td>
      <td>${p.category}</td>
      <td>Ksh ${p.price}</td>
      <td>${p.stock}</td>
      <td>${p.sku}</td>
      <td>
        <button class="edit" onclick="editProduct(${index})">Edit</button>
        <button class="delete" onclick="deleteProduct(${index})">Delete</button>
      </td>`;
    productTableBody.appendChild(tr);
  });
}

function editProduct(index){
  const p = products[index];
  document.getElementById("name").value = p.name;
  document.getElementById("description").value = p.description;
  document.getElementById("category").value = p.category;
  document.getElementById("price").value = p.price;
  document.getElementById("stock").value = p.stock;
  document.getElementById("sku").value = p.sku;
  document.getElementById("image").value = p.image;
  document.getElementById("video").value = p.video;
  document.getElementById("editProductIndex").value = index;
}

function deleteProduct(index){
  if(confirm("Are you sure you want to delete this product?")){
    products.splice(index,1);
    localStorage.setItem("products", JSON.stringify(products));
    displayProducts();
    alert("Product deleted. Homepage will update automatically.");
  }
}

productForm.addEventListener("submit", function(e){
  e.preventDefault();
  const newProduct = {
    name: document.getElementById("name").value,
    description: document.getElementById("description").value,
    category: document.getElementById("category").value,
    price: parseFloat(document.getElementById("price").value),
    stock: parseInt(document.getElementById("stock").value),
    sku: document.getElementById("sku").value,
    image: document.getElementById("image").value,
    video: document.getElementById("video").value
  };

  const editIndex = document.getElementById("editProductIndex").value;
  if(editIndex === ""){
    products.push(newProduct);
    alert("Product added successfully. Homepage will update automatically.");
  } else {
    products[editIndex] = newProduct;
    alert("Product updated successfully. Homepage will update automatically.");
  }

  localStorage.setItem("products", JSON.stringify(products));
  productForm.reset();
  document.getElementById("editProductIndex").value = "";
  displayProducts();
});

displayProducts();
</script>

  <!-- ===== POLICIES ===== -->
<section>
  <h2>Manage Policies (HTML Allowed)</h2>

  <form id="policyForm">
    <select id="policySelect" style="padding:10px; margin-bottom:10px;" required>
      <option value="">-- Select Policy --</option>
      <option value="terms">Terms of Service</option>
      <option value="privacy">Privacy Policy</option>
      <option value="refund">Refund Policy</option>
      <option value="shipping">Shipping Policy</option>
    </select>

    <textarea id="policyText" rows="8" style="width:100%; padding:10px; border-radius:8px;" placeholder="Enter policy content here (HTML allowed)"></textarea>
    <button type="submit" style="margin-top:10px;">Save / Update Policy</button>
  </form>

  <table id="policyTable">
    <thead>
      <tr>
        <th>Policy Name</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</section>

<script>
/* ===== POLICY MANAGEMENT ===== */

// Initialize policies from localStorage or default values
let policies = JSON.parse(localStorage.getItem("policies")) || {
  terms: "Terms of Service content here...",
  privacy: "Privacy Policy content here...",
  refund: "Refund Policy content here...",
  shipping: "Shipping Policy content here..."
};

const policyForm = document.getElementById("policyForm");
const policySelect = document.getElementById("policySelect");
const policyText = document.getElementById("policyText");
const policyTableBody = document.querySelector("#policyTable tbody");

// Display all policies in the table
function displayPolicies() {
  policyTableBody.innerHTML = "";
  for (let key in policies) {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${key.charAt(0).toUpperCase() + key.slice(1)}</td>
      <td>
        <button type="button" class="edit" onclick="editPolicy('${key}')">Edit</button>
        <button type="button" class="delete" onclick="deletePolicy('${key}')">Delete</button>
      </td>`;
    policyTableBody.appendChild(tr);
  }
}

// Edit a policy
function editPolicy(key) {
  policySelect.value = key;
  policyText.value = policies[key];
}

// Delete a policy
function deletePolicy(key) {
  if (confirm(`Are you sure you want to delete the "${key}" policy?`)) {
    delete policies[key];
    localStorage.setItem("policies", JSON.stringify(policies));
    displayPolicies();
    policyText.value = "";
    policySelect.value = "";
    alert("Policy deleted successfully!");
  }
}

// Save / Update policy
policyForm.addEventListener("submit", (e) => {
  e.preventDefault();
  const key = policySelect.value;
  if (!key) return alert("Please select a policy to save/update.");
  policies[key] = policyText.value;
  localStorage.setItem("policies", JSON.stringify(policies));
  displayPolicies();
  alert("Policy saved successfully!");
});

// Load policy content when changing selection
policySelect.addEventListener("change", () => {
  const key = policySelect.value;
  policyText.value = policies[key] || "";
});

// Initial table load
displayPolicies();
</script>

  
<!-- ===== BLOG POSTS ===== -->
<section>
  <h2>Manage Blog Posts (HTML Allowed)</h2>

  <form id="blogForm">
    <input type="hidden" id="editBlogIndex">
    <input type="text" id="blogTitle" placeholder="Blog Title (HTML allowed)" required>
    <textarea id="blogContent" placeholder="Blog Content (HTML allowed)" rows="5" required></textarea>
    <input type="text" id="blogCategory" placeholder="Category (optional)">
    <input type="text" id="blogAuthor" placeholder="Author Name" required>
    <input type="date" id="blogDate" required>
    <button type="submit">Add / Update Blog Post</button>
  </form>

  <table id="blogTable">
    <thead>
      <tr>
        <th>Title</th>
        <th>Category</th>
        <th>Author</th>
        <th>Date</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</section>

<script>
/* ===== BLOG POSTS MANAGEMENT ===== */
let blogs = JSON.parse(localStorage.getItem("blogs")) || [];
const blogForm = document.getElementById("blogForm");
const blogTableBody = document.querySelector("#blogTable tbody");

// Display table
function displayBlogs(){
  blogTableBody.innerHTML = "";
  blogs.forEach((b,index)=>{
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${b.title}</td>
      <td>${b.category || ""}</td>
      <td>${b.author}</td>
      <td>${b.date}</td>
      <td>
        <button class="edit" onclick="editBlog(${index})">Edit</button>
        <button class="delete" onclick="deleteBlog(${index})">Delete</button>
      </td>`;
    blogTableBody.appendChild(tr);
  });
}

// Edit blog
function editBlog(index){
  const b = blogs[index];
  document.getElementById("blogTitle").value = b.title;
  document.getElementById("blogContent").value = b.content;
  document.getElementById("blogCategory").value = b.category;
  document.getElementById("blogAuthor").value = b.author;
  document.getElementById("blogDate").value = b.date;
  document.getElementById("editBlogIndex").value = index;
}

// Delete blog
function deleteBlog(index){
  if(confirm("Are you sure you want to delete this blog post?")){
    blogs.splice(index,1);
    localStorage.setItem("blogs", JSON.stringify(blogs));
    displayBlogs();
    alert("Blog deleted.");
  }
}

// Add / Update blog
blogForm.addEventListener("submit", (e)=>{
  e.preventDefault();
  const newBlog = {
    title: document.getElementById("blogTitle").value,
    content: document.getElementById("blogContent").value,
    category: document.getElementById("blogCategory").value,
    author: document.getElementById("blogAuthor").value,
    date: document.getElementById("blogDate").value
  };

  const editIndex = document.getElementById("editBlogIndex").value;
  if(editIndex === ""){
    blogs.push(newBlog);
    alert("Blog added successfully.");
  } else {
    blogs[editIndex] = newBlog;
    alert("Blog updated successfully.");
  }

  localStorage.setItem("blogs", JSON.stringify(blogs));
  blogForm.reset();
  document.getElementById("editBlogIndex").value = "";
  displayBlogs();
});

// Initial load
displayBlogs();
</script>
</body>
</html>

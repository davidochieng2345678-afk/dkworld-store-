<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DK World Kenya | Admin Panel</title>
  <meta name="description" content="Admin panel to manage products for DK World Kenya.">
  <style>
    body { font-family:sans-serif; margin:0; padding:0; background:#f5f5f5; }
    header { background:#1E3A8A; color:white; padding:15px; display:flex; justify-content:space-between; align-items:center; }
    header h1 { margin:0; font-size:24px; }
    nav ul { list-style:none; display:flex; gap:15px; margin:0; padding:0; }
    nav a { color:white; text-decoration:none; font-weight:bold; }
    main { max-width:1000px; margin:40px auto; padding:0 20px; }
    form { background:#fff; padding:20px; border-radius:12px; margin-bottom:40px; box-shadow:0 3px 10px rgba(0,0,0,0.05); }
    form input, form textarea, form select, form button { width:100%; padding:10px; margin:5px 0; border-radius:6px; border:1px solid #ccc; }
    .product-card { background:white; border-radius:12px; padding:15px; margin-bottom:15px; box-shadow:0 3px 10px rgba(0,0,0,0.05); display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; }
    .product-info h3 { margin:0; }
    .product-info p { margin:5px 0; }
    .action-btn { padding:6px 12px; border:none; border-radius:6px; cursor:pointer; }
    .edit-btn { background:#f59e0b; color:white; }
    .delete-btn { background:#ef4444; color:white; margin-left:5px; }
  </style>
</head>
<body>

<header>
  <h1>DK World Kenya Admin 🌍</h1>
  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="admin.html">Admin</a></li>
    </ul>
  </nav>
</header>

<main>
  <h2>Manage Products</h2>

  <form id="productForm">
    <input type="text" id="name" placeholder="Product Name" required>
    <input type="number" id="price" placeholder="Price (KES)" required>
    <input type="text" id="image" placeholder="Main Image URL (optional)">
    <input type="text" id="images" placeholder="Additional Images (comma separated)">
    <input type="text" id="video" placeholder="Video URL (optional)">
    <input type="text" id="sku" placeholder="SKU (optional)">
    <input type="number" id="stock" placeholder="Stock quantity">
    <select id="category">
      <option value="">Select Category</option>
      <option value="Websites">Websites</option>
      <option value="Digital Products">Digital Products</option>
    </select>
    <textarea id="description" placeholder="Product Description"></textarea>
    <input type="text" id="faqQ1" placeholder="FAQ Question 1">
    <input type="text" id="faqA1" placeholder="FAQ Answer 1">
    <input type="text" id="faqQ2" placeholder="FAQ Question 2">
    <input type="text" id="faqA2" placeholder="FAQ Answer 2">
    <button type="submit" id="addUpdateBtn">Add Product</button>
    <button type="button" onclick="resetForm()" style="background:#6b7280; color:white;">Reset Form</button>
  </form>

  <h3>Existing Products</h3>
  <div id="existingProducts"></div>

</main>

<script>
  const PRODUCTS_KEY = "dkworld_products";
  let editIndex = null;

  // Load products from localStorage
  function loadProducts() {
    return JSON.parse(localStorage.getItem(PRODUCTS_KEY)) || [];
  }

  // Save products to localStorage
  function saveProducts(products){
    localStorage.setItem(PRODUCTS_KEY, JSON.stringify(products));
  }

  // Reset form
  function resetForm(){
    ["name","price","image","images","video","sku","stock","category","description","faqQ1","faqA1","faqQ2","faqA2"]
      .forEach(id => document.getElementById(id).value = "");
    document.getElementById("addUpdateBtn").textContent = "Add Product";
    editIndex = null;
  }

  // Display products in admin
  function displayProducts(){
    const container = document.getElementById("existingProducts");
    container.innerHTML = "";
    const products = loadProducts();
    if(products.length===0){
      container.innerHTML="<p>No products yet.</p>";
      return;
    }

    products.forEach((p,index)=>{
      const div = document.createElement("div");
      div.className = "product-card";

      div.innerHTML = `
        <div class="product-info">
          <h3>${p.name}</h3>
          <p>${p.category} | KES ${p.price} | Stock: ${p.stock}</p>
          <p>${p.description}</p>
        </div>
        <div>
          <button class="action-btn edit-btn">Edit</button>
          <button class="action-btn delete-btn">Delete</button>
        </div>
      `;

      div.querySelector(".edit-btn").addEventListener("click", ()=>editProduct(index));
      div.querySelector(".delete-btn").addEventListener("click", ()=>deleteProduct(index));

      container.appendChild(div);
    });
  }

  // Add or update product
  function addOrUpdateProduct(e){
    e.preventDefault();
    const name = document.getElementById("name").value.trim();
    const price = parseFloat(document.getElementById("price").value);
    const mainImage = document.getElementById("image").value.trim();
    const imagesInput = document.getElementById("images").value.trim();
    const images = imagesInput ? imagesInput.split(",").map(i=>i.trim()) : [];
    if(mainImage) images.unshift(mainImage);

    if(!name || !price || images.length===0){
      alert("Fill in name, price and at least one image!");
      return;
    }

    const product = {
      name,
      price,
      images,
      video: document.getElementById("video").value.trim(),
      sku: document.getElementById("sku").value.trim(),
      stock: parseInt(document.getElementById("stock").value) || 0,
      category: document.getElementById("category").value,
      description: document.getElementById("description").value.trim(),
      faq:[
        { question: document.getElementById("faqQ1").value, answer: document.getElementById("faqA1").value },
        { question: document.getElementById("faqQ2").value, answer: document.getElementById("faqA2").value }
      ].filter(f=>f.question && f.answer)
    };

    const products = loadProducts();
    if(editIndex !== null){
      products[editIndex] = product;
      alert("✅ Product updated!");
    } else {
      products.push(product);
      alert("✅ Product added!");
    }

    saveProducts(products);
    displayProducts();
    resetForm();
  }

  // Edit product
  function editProduct(index){
    const products = loadProducts();
    const p = products[index];
    editIndex = index;

    document.getElementById("name").value = p.name;
    document.getElementById("price").value = p.price;
    document.getElementById("image").value = p.images[0] || "";
    document.getElementById("images").value = p.images.slice(1).join(", ");
    document.getElementById("video").value = p.video;
    document.getElementById("sku").value = p.sku;
    document.getElementById("stock").value = p.stock;
    document.getElementById("category").value = p.category;
    document.getElementById("description").value = p.description;
    document.getElementById("faqQ1").value = p.faq[0]?.question || "";
    document.getElementById("faqA1").value = p.faq[0]?.answer || "";
    document.getElementById("faqQ2").value = p.faq[1]?.question || "";
    document.getElementById("faqA2").value = p.faq[1]?.answer || "";

    document.getElementById("addUpdateBtn").textContent = "Save Changes";
  }

  // Delete product
  function deleteProduct(index){
    const products = loadProducts();
    if(confirm(`Delete "${products[index].name}"?`)){
      products.splice(index,1);
      saveProducts(products);
      displayProducts();
    }
  }

  document.getElementById("productForm").addEventListener("submit", addOrUpdateProduct);
  document.addEventListener("DOMContentLoaded", displayProducts);
</script>

</body>
</html>

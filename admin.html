<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DK World Kenya | Admin Panel & Products</title>
<meta name="description" content="Admin panel to add, edit, and manage products for DK World Kenya. Includes full homepage layout for preview.">
<link rel="stylesheet" href="css/style.css">
<style>
/* ===== GENERAL STYLES ===== */
body { font-family: sans-serif; margin:0; padding:0; background:#f4f4f4; }
h1,h2,h3,h4 { margin:0 0 10px; }
button { cursor:pointer; }

/* ===== ADMIN PANEL ===== */
.admin-panel { max-width:900px; margin:40px auto; padding:30px; background:#f9f9f9; border-radius:12px; box-shadow:0 5px 20px rgba(0,0,0,0.05); }
.admin-panel h2 { color:#1E3A8A; margin-bottom:15px; }
.admin-panel input, .admin-panel textarea, .admin-panel select, .admin-panel button { width:100%; padding:10px; margin-bottom:15px; border-radius:8px; border:1px solid #ccc; font-size:1rem; }
.admin-panel textarea { min-height:80px; resize:vertical; }
.admin-panel button { background:#1E3A8A; color:#fff; border:none; font-weight:bold; transition:0.3s; }
.admin-panel button:hover { background:#111E6C; }

/* ===== PRODUCT CARD ===== */
.product-card { background:#fff; border-radius:12px; padding:15px; margin-bottom:15px; display:flex; justify-content:space-between; align-items:center; box-shadow:0 3px 10px rgba(0,0,0,0.05); }
.product-card img { max-width:120px; border-radius:8px; margin-top:10px; }
.edit-btn { background:#3B82F6; color:#fff; border:none; padding:6px 12px; border-radius:6px; transition:0.3s; }
.edit-btn:hover { background:#1E40AF; }
.delete-btn { background:#EF4444; color:#fff; border:none; padding:6px 12px; border-radius:6px; transition:0.3s; }
.delete-btn:hover { background:#C22E2E; }

/* ===== FAQ ===== */
.faq-section { display:flex; gap:10px; flex-wrap:wrap; }
.faq-section input { flex:1; min-width:200px; }

/* ===== WHATSAPP FLOAT ===== */
.whatsapp-float { position:fixed; bottom:20px; right:20px; z-index:1000; }
.whatsapp-float img { height:60px; width:60px; }
</style>
</head>
<body>

<!-- ===== ADMIN PANEL ===== -->
<section class="admin-panel">
  <h2>Admin Panel: Add / Edit Products</h2>
  <input id="name" placeholder="Product Name" required>
  <input id="price" type="number" placeholder="Price (KES)" required>
  <input id="image" placeholder="Main Image URL" required>
  <input id="images" placeholder="Extra Images (comma separated URLs)">
  <input id="video" placeholder="YouTube Video Link (optional)">
  <input id="sku" placeholder="SKU (e.g ECOM-001)">
  <input id="stock" type="number" placeholder="Stock Quantity" required>
  <select id="category">
    <option value="Websites">Websites</option>
    <option value="Digital Products">Digital Products</option>
  </select>
  <textarea id="description" placeholder="Product Description" required></textarea>

  <h3>FAQs</h3>
  <div class="faq-section">
    <input id="faqQ1" placeholder="Question 1">
    <input id="faqA1" placeholder="Answer 1">
  </div>
  <div class="faq-section">
    <input id="faqQ2" placeholder="Question 2">
    <input id="faqA2" placeholder="Answer 2">
  </div>

  <button id="addUpdateBtn">Add Product</button>

  <h2>Existing Products</h2>
  <div id="existingProducts"></div>
</section>

<!-- ===== PRODUCT DISPLAY ===== -->
<section id="productsContainer" class="products" style="max-width:900px;margin:20px auto;"></section>

<!-- ===== WHATSAPP FLOAT ===== -->
<a href="https://wa.me/254710346425" target="_blank" class="whatsapp-float">
  <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="WhatsApp">
</a>

<!-- ===== JS ===== -->
<script>
const STORAGE_KEY = "products";
let editIndex = null;

// ===== STORAGE FUNCTIONS =====
function loadProducts() { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
function saveProducts(products) { localStorage.setItem(STORAGE_KEY, JSON.stringify(products)); }

// ===== FORM FUNCTIONS =====
function resetForm() {
  ["name","price","image","images","video","sku","stock","category","description","faqQ1","faqA1","faqQ2","faqA2"]
    .forEach(id => document.getElementById(id).value = "");
  document.getElementById("addUpdateBtn").textContent = "Add Product";
  editIndex = null;
  document.querySelector(".admin-panel h2").textContent = "Admin Panel: Add / Edit Products";
}

function addOrUpdateProduct() {
  const name = document.getElementById("name").value.trim();
  const price = parseFloat(document.getElementById("price").value);
  const mainImage = document.getElementById("image").value.trim();
  const extraImages = document.getElementById("images").value.trim().split(",").map(i=>i.trim()).filter(Boolean);
  const images = mainImage ? [mainImage, ...extraImages] : extraImages;
  const video = document.getElementById("video").value.trim();
  const sku = document.getElementById("sku").value.trim();
  const stock = parseInt(document.getElementById("stock").value) || 0;
  const category = document.getElementById("category").value;
  const description = document.getElementById("description").value.trim();
  const faq = [
    {question: document.getElementById("faqQ1").value, answer: document.getElementById("faqA1").value},
    {question: document.getElementById("faqQ2").value, answer: document.getElementById("faqA2").value}
  ].filter(f => f.question && f.answer);

  if(!name || !price || images.length===0 || !description) {
    alert("Fill in all required fields!");
    return;
  }

  const product = { name, price, images, video, sku, stock, category, description, faq };
  const products = loadProducts();
  if(editIndex !== null){ products[editIndex] = product; alert("✅ Product updated!"); }
  else { products.push(product); alert("✅ Product added!"); }

  saveProducts(products);
  displayExistingProducts();
  displayFrontProducts();
  resetForm();
}

// ===== DISPLAY FUNCTIONS =====
function displayExistingProducts() {
  const container = document.getElementById("existingProducts");
  const products = loadProducts();
  container.innerHTML = "";
  if(products.length===0){ container.innerHTML="<p>No products yet.</p>"; return; }
  products.forEach((p,index)=>{
    const div = document.createElement("div"); div.className="product-card";
    const info = document.createElement("div");
    info.innerHTML=`<strong>${p.name}</strong> (${p.category}) - KES ${p.price} - Stock: ${p.stock}`;
    const btnDiv = document.createElement("div"); btnDiv.style.display="flex"; btnDiv.style.gap="5px";
    const editBtn=document.createElement("button"); editBtn.className="edit-btn"; editBtn.textContent="Edit"; editBtn.onclick=()=>editProduct(index);
    const delBtn=document.createElement("button"); delBtn.className="delete-btn"; delBtn.textContent="Delete"; delBtn.onclick=()=>deleteProduct(index);
    btnDiv.appendChild(editBtn); btnDiv.appendChild(delBtn);
    div.appendChild(info); div.appendChild(btnDiv);
    container.appendChild(div);
  });
}

function displayFrontProducts() {
  const container = document.getElementById("productsContainer");
  const products = loadProducts();
  container.innerHTML = "";
  if(products.length===0){ container.innerHTML="<p>No products yet.</p>"; return; }
  products.forEach(p=>{
    const div = document.createElement("div"); div.className="product-card";
    div.innerHTML = `
      <h3>${p.name}</h3>
      <p>${p.category} | KES ${p.price} | Stock: ${p.stock}</p>
      <p>${p.description}</p>
      ${p.images[0] ? `<img src="${p.images[0]}" alt="${p.name}">` : ""}
    `;
    container.appendChild(div);
  });
}

// ===== EDIT / DELETE =====
function editProduct(index) {
  const p = loadProducts()[index]; editIndex=index;
  document.getElementById("name").value=p.name;
  document.getElementById("price").value=p.price;
  document.getElementById("image").value=p.images[0]||"";
  document.getElementById("images").value=p.images.slice(1).join(", ");
  document.getElementById("video").value=p.video;
  document.getElementById("sku").value=p.sku;
  document.getElementById("stock").value=p.stock;
  document.getElementById("category").value=p.category;
  document.getElementById("description").value=p.description;
  document.getElementById("faqQ1").value=p.faq[0]?.question||"";
  document.getElementById("faqA1").value=p.faq[0]?.answer||"";
  document.getElementById("faqQ2").value=p.faq[1]?.question||"";
  document.getElementById("faqA2").value=p.faq[1]?.answer||"";
  document.getElementById("addUpdateBtn").textContent="Save Changes";
  document.querySelector(".admin-panel h2").textContent="Edit Product";
}

function deleteProduct(index) {
  if(!confirm("Are you sure?")) return;
  const products = loadProducts();
  products.splice(index,1);
  saveProducts(products);
  displayExistingProducts();
  displayFrontProducts();
}

// ===== INITIALIZE =====
document.addEventListener("DOMContentLoaded",()=>{
  displayExistingProducts();
  displayFrontProducts();
  document.getElementById("addUpdateBtn").addEventListener("click", addOrUpdateProduct);
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DK World Kenya | Admin Panel</title>
  <meta name="description" content="Admin panel to add new products to DK World Kenya.">
  <link rel="stylesheet" href="css/style.css">
  <style>
    input, textarea, select, button {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }
    button {
      background: #25D366;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background: #128C7E;
    }
    #existingProducts div img {
      width: 50px;
      height: 50px;
      object-fit: cover;
      margin-right: 10px;
      border-radius: 4px;
    }
    #existingProducts div {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid #ccc;
      padding: 8px;
      margin-bottom: 10px;
      border-radius: 6px;
    }
    #existingProducts a {
      text-decoration: none;
      color: #000;
    }
  </style>
</head>
<body>

<header>
  <h1>DK World Kenya 🌍 - Admin Panel</h1>
  <nav>
    <div class="menu-toggle" id="menu-toggle">☰</div>
    <ul class="menu" id="menu">
      <li><a href="index.html">Home</a></li>
      <li><a href="cart.html">Cart 🛒</a></li>
    </ul>
  </nav>
</header>

<main style="padding: 20px; max-width: 800px; margin: auto;">

  <h2>Add Product</h2>

  <input id="name" placeholder="Product Name">
  <input id="price" type="number" placeholder="Price (KES)">
  <input id="image" placeholder="Main Image URL">
  <input id="images" placeholder="Extra Images (comma separated URLs)">
  <input id="video" placeholder="YouTube Video Link (optional)">
  <input id="sku" placeholder="SKU (e.g ECOM-001)">
  <input id="stock" type="number" placeholder="Stock Quantity">

  <select id="category">
    <option value="Websites">Websites</option>
    <option value="Digital Products">Digital Products</option>
  </select>

  <textarea id="description" placeholder="Product Description"></textarea>

  <h3>FAQs</h3>
  <input id="faqQ1" placeholder="Question 1">
  <input id="faqA1" placeholder="Answer 1">
  <input id="faqQ2" placeholder="Question 2">
  <input id="faqA2" placeholder="Answer 2">

  <button onclick="addProductFromForm()">Add Product</button>

  <h2>Existing Products</h2>
  <div id="existingProducts"></div>
</main>

<script>
// ====== HELPER FUNCTION ======
function saveProducts(products){
  localStorage.setItem("products", JSON.stringify(products));
}

// ====== ADD PRODUCT ======
function addProductFromForm(){
  const name = document.getElementById("name").value.trim();
  const price = parseFloat(document.getElementById("price").value);
  const mainImage = document.getElementById("image").value.trim();
  const extraImagesInput = document.getElementById("images").value.trim();
  const images = extraImagesInput ? extraImagesInput.split(",").map(url => url.trim()) : [];
  if(mainImage) images.unshift(mainImage);
  const video = document.getElementById("video").value.trim();
  const sku = document.getElementById("sku").value.trim();
  const stock = parseInt(document.getElementById("stock").value) || 0;
  const category = document.getElementById("category").value;
  const description = document.getElementById("description").value.trim();

  const faq = [];
  const faqQ1 = document.getElementById("faqQ1").value.trim();
  const faqA1 = document.getElementById("faqA1").value.trim();
  if(faqQ1 && faqA1) faq.push({question: faqQ1, answer: faqA1});
  const faqQ2 = document.getElementById("faqQ2").value.trim();
  const faqA2 = document.getElementById("faqA2").value.trim();
  if(faqQ2 && faqA2) faq.push({question: faqQ2, answer: faqA2});

  if(!name || !price || images.length === 0 || !description){
    alert("Please fill in all required fields: Name, Price, Main Image, Description");
    return;
  }

  const newProduct = { name, price, images, video, sku, stock, category, description, faq };
  const products = JSON.parse(localStorage.getItem("products")) || [];
  products.push(newProduct);
  saveProducts(products);

  alert(`✅ Product "${name}" added successfully!`);
  displayExistingProducts();

  document.getElementById("name").value = "";
  document.getElementById("price").value = "";
  document.getElementById("image").value = "";
  document.getElementById("images").value = "";
  document.getElementById("video").value = "";
  document.getElementById("sku").value = "";
  document.getElementById("stock").value = "";
  document.getElementById("description").value = "";
  document.getElementById("faqQ1").value = "";
  document.getElementById("faqA1").value = "";
  document.getElementById("faqQ2").value = "";
  document.getElementById("faqA2").value = "";
}

// ====== REMOVE PRODUCT ======
function removeProduct(index){
  const products = JSON.parse(localStorage.getItem("products")) || [];
  if(!products[index]) return;
  if(!confirm(`Are you sure you want to delete "${products[index].name}"?`)) return;

  products.splice(index,1);
  saveProducts(products);
  displayExistingProducts();
}

// ====== DISPLAY PRODUCTS ======
function displayExistingProducts(){
  const container = document.getElementById("existingProducts");
  const products = JSON.parse(localStorage.getItem("products")) || [];
  container.innerHTML = "";

  if(products.length === 0){
    container.innerHTML = "<p>No products added yet.</p>";
    return;
  }

  products.forEach((p,index) => {
    const div = document.createElement("div");

    const leftDiv = document.createElement("div");
    leftDiv.style.display = "flex";
    leftDiv.style.alignItems = "center";

    if(p.images && p.images[0]){
      const img = document.createElement("img");
      img.src = p.images[0];
      leftDiv.appendChild(img);
    }

    const link = document.createElement("a");
    link.href = `product.html?name=${encodeURIComponent(p.name)}`;
    link.target = "_blank";
    link.textContent = `${p.name} (${p.category}) - KES ${p.price} - Stock: ${p.stock}`;
    leftDiv.appendChild(link);

    const skuText = document.createElement("small");
    skuText.textContent = ` SKU: ${p.sku}`;
    leftDiv.appendChild(skuText);

    const deleteBtn = document.createElement("button");
    deleteBtn.textContent = "Delete";
    deleteBtn.onclick = () => removeProduct(index);

    div.appendChild(leftDiv);
    div.appendChild(deleteBtn);

    container.appendChild(div);
  });
}

document.addEventListener("DOMContentLoaded", displayExistingProducts);
</script>

</body>
</html>

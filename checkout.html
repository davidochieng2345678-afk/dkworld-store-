<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | DK World Kenya</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background:#f9f9f9; }
    h2 { margin-bottom: 20px; }
    input { padding: 10px; margin: 5px 0; width: 100%; border-radius: 6px; border:1px solid #ccc; }
    button { padding: 12px 20px; border:none; border-radius:6px; background:#25D366; color:white; cursor:pointer; margin-top:10px; width:100%; }
    .cart-item { background:#fff; padding:10px; border-radius:6px; margin-bottom:10px; }
    .cart-summary { margin-bottom:20px; }
  </style>
</head>
<body>

<h2>Checkout</h2>

<div class="cart-summary" id="cartSummary"></div>

<form id="form">
  <input id="name" placeholder="Name" required><br>
  <input id="phone" placeholder="Phone" required><br>
  <button type="submit">Place Order via WhatsApp</button>
</form>

<script>
  const cart = JSON.parse(localStorage.getItem("cart")) || [];
  const cartSummary = document.getElementById("cartSummary");

  let total = 0;
  if(cart.length === 0){
    cartSummary.innerHTML = "<p>Your cart is empty.</p>";
  } else {
    cart.forEach(item => {
      total += item.price * item.quantity;
      cartSummary.innerHTML += `
        <div class="cart-item">
          <strong>${item.name}</strong> x ${item.quantity} <br>
          KES ${item.price} each → KES ${item.price * item.quantity}
        </div>
      `;
    });
    cartSummary.innerHTML += `<p><strong>Total: KES ${total}</strong></p>`;
  }

  document.getElementById("form").addEventListener("submit", e => {
    e.preventDefault();
    if(cart.length === 0){
      alert("Your cart is empty!");
      return;
    }

    const name = document.getElementById("name").value.trim();
    const phone = document.getElementById("phone").value.trim();

    if(!name || !phone){
      alert("Please enter your name and phone number.");
      return;
    }

    // Build WhatsApp message
    let message = `Hello DK World Kenya,%0A%0AI want to place an order:%0A`;
    cart.forEach(item => {
      message += `- ${item.name} x ${item.quantity} (KES ${item.price * item.quantity})%0A`;
    });
    message += `%0ATotal: KES ${total}%0A%0ACustomer: ${name}%0APhone: ${phone}`;

    const whatsappNumber = "254710346425"; // DK World Kenya
    window.open(`https://wa.me/${whatsappNumber}?text=${message}`, "_blank");

    // Clear cart
    localStorage.removeItem("cart");
  });
</script>

</body>
</html>
